<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.12);
      padding: 40px 60px;
      border-radius: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      margin-bottom: 24px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #5a4fcf;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #f2f2f2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome</h1>
    <p>Hello! Click below to enter the next page.</p>
    <button onclick="window.location.href='page2.html'">Go to Next Page</button>
  </div>

</html>
